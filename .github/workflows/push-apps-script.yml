name: Push Apps Script

on:
  push:
    paths:
      - 'scripts/SessionNoteProcessor.gs'

jobs:
  push-to-apps-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Setup and push
        run: |
          cd scripts
          cp SessionNoteProcessor.gs Code.gs
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}"}' > .clasp.json
          echo '{"timeZone":"Africa/Johannesburg","dependencies":{},"exceptionLogging":"STACKDRIVER","runtimeVersion":"V8"}' > appsscript.json
          echo "=== files in scripts ===" && ls -la
          echo "=== clasp version ===" && clasp --version
          echo "=== .clasp.json ===" && cat .clasp.json
          echo "=== appsscript.json ===" && cat appsscript.json
          echo "=== clasp push output ===" 
          clasp push --force 2>&1 || true
          echo "=== exit ===" && clasp push --force
