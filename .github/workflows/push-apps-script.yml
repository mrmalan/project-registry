name: Push Apps Script

on:
  push:
    paths:
      - 'scripts/SessionNoteProcessor.gs'

jobs:
  push-to-apps-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Copy gs file to Code.gs
        run: cp scripts/SessionNoteProcessor.gs scripts/Code.gs

      - name: Push to Apps Script
        working-directory: scripts
        run: |
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}"}' > .clasp.json
          clasp push --force
